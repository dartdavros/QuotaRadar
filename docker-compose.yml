name: quotaradar

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-application: &application
  build:
    context: .
    dockerfile: Dockerfile
  image: quotaradar:local
  pull_policy: build
  restart: unless-stopped
  logging: *default-logging
  environment:
    DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
    DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?Set DJANGO_ALLOWED_HOSTS in .env}
    POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    REDIS_URL: redis://redis:6379/0
    QUOTARADAR_MASTER_KEY_FILE: /run/secrets/quota_radar_master_key
  secrets:
    - source: quota_radar_master_key
      target: quota_radar_master_key
  networks:
    - backend

x-runtime-dependencies: &runtime-dependencies
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  init:
    condition: service_completed_successfully

services:
  init:
    <<: *application
    command: ["init"]
    restart: "no"
    volumes:
      - static_data:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    <<: *application
    command: ["web"]
    volumes:
      - static_data:/app/staticfiles
    ports:
      - "${QUOTARADAR_WEB_BIND_ADDRESS:?Set QUOTARADAR_WEB_BIND_ADDRESS in .env}:8000:8000"
    depends_on: *runtime-dependencies
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/admin/login/', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  bot:
    <<: *application
    command: ["bot"]
    depends_on: *runtime-dependencies

  worker:
    <<: *application
    command: ["worker"]
    depends_on: *runtime-dependencies

  beat:
    <<: *application
    command: ["beat"]
    depends_on: *runtime-dependencies

  test:
    <<: *application
    restart: "no"
    profiles: ["tools"]
    command: ["test"]
    environment:
      DJANGO_SECRET_KEY: integration-test-django-secret-key
      DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
      DJANGO_SETTINGS_MODULE: quotaradar.integration_test_settings
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/15
      QUOTARADAR_MASTER_KEY_FILE: /run/secrets/quota_radar_master_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:?Set POSTGRES_USER in .env} -d ${POSTGRES_DB:?Set POSTGRES_DB in .env}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    logging: *default-logging
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--save",
        "60",
        "1000",
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  static_data:

networks:
  backend:
    driver: bridge

secrets:
  quota_radar_master_key:
    file: ./docker/secrets/master.key
